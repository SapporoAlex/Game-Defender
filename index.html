<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1020" />
    <title>Defender</title>
    <link rel="icon" href="assets/icon.jpg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="side-left"></div>

      <div id="stage-wrap">
        <div id="stage-area">
          <canvas id="game-canvas" width="750" height="750"></canvas>

          <div id="loading-overlay">
            <div id="loading-title">DEFENDER</div>
            <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
            <div id="loading-text">Loading assets&hellip;</div>
          </div>

          <div id="unlock-overlay" class="hidden">
            <div id="unlock-box">Tap / Click to Start</div>
          </div>
        </div>

        <div id="bottom-bar"></div>
      </div>

      <div id="side-right"></div>
    </div>

    <!-- Touch control widgets: relocated into side-left/side-right (landscape)
     or bottom-bar (portrait) at runtime by layout.js -->
    <div id="stick-zone" class="control-cluster hidden">
      <div id="stick-base">
        <div id="stick-nub"></div>
      </div>
    </div>
    <div id="fire-zone" class="control-cluster hidden">
      <button id="fire-button" aria-label="Fire">FIRE</button>
    </div>

    <script src="js/assets.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/masks.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/input.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
